services:
  oracle-db:
    image: gvenzl/oracle-xe:latest
    container_name: oracle-db-container
    ports:
      - "1521:1521"
    environment:
      - ORACLE_PASSWORD=admin123
      - APP_USER=edu
      - APP_USER_PASSWORD=1234
    volumes:
      - oracle-data:/opt/oracle/oradata

volumes:
  oracle-data: